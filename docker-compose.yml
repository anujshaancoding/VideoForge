# VideoForge — local backing services (Pipeline.md §2.4).
# apps/web + apps/api run on the host for fast HMR; apps/render-worker runs from
# its own pinned-FFmpeg image (added by the render-worker package). This file
# brings up the three stateful backing services + a one-shot bucket creator.
#
#   docker compose up -d --wait
#
name: videoforge-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-videoforge}
      POSTGRES_USER: ${POSTGRES_USER:-videoforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-videoforge_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-videoforge}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Local-disk S3 double. The ONLY storage backend in dev/CI (MVP_Scope §6).
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console (minioadmin / minioadmin)
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: creates the bucket (with originals/ proxies/ exports/ prefixes
  # used at runtime) once MinIO is healthy, then exits.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb -p local/${S3_BUCKET:-videoforge};
      mc anonymous set none local/${S3_BUCKET:-videoforge};
      exit 0;
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
