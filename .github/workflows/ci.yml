name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.12.0'
  FFMPEG_VERSION: '6.1.1'
  POSTGRES_URL: postgresql://videoforge:videoforge_dev@localhost:5432/videoforge
  REDIS_URL: redis://localhost:6379
  S3_ENDPOINT: http://localhost:9000
  S3_REGION: us-east-1
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  S3_FORCE_PATH_STYLE: 'true'
  S3_BUCKET_ORIGINALS: vf-originals
  S3_BUCKET_PROXIES: vf-proxies
  S3_BUCKET_EXPORTS: vf-exports

jobs:
  # ── Stage 1: Typecheck ────────────────────────────────────────────────────
  typecheck:
    name: Stage 1 — Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # ── Stage 2: Lint ─────────────────────────────────────────────────────────
  lint:
    name: Stage 2 — Lint
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  # ── Stage 3: Unit + Integration tests ────────────────────────────────────
  unit-integration:
    name: Stage 3 — Unit + Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: videoforge
          POSTGRES_USER: videoforge
          POSTGRES_PASSWORD: videoforge_dev
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
      minio:
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports: ['9000:9000']
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/ready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build --filter "./packages/*"
      - run: pnpm --filter @videoforge/api db:migrate
        env: { DATABASE_URL: '${{ env.POSTGRES_URL }}' }
      - run: pnpm test

  # ── Stage 4: Golden-frame fidelity gate ──────────────────────────────────
  golden:
    name: Stage 4 — Golden Frame Fidelity Gate
    runs-on: ubuntu-latest
    needs: unit-integration
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - name: Cache FFmpeg ${{ env.FFMPEG_VERSION }}
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /tmp/ffmpeg-${{ env.FFMPEG_VERSION }}
          key: ffmpeg-${{ env.FFMPEG_VERSION }}-linux-amd64-static
      - name: Download FFmpeg ${{ env.FFMPEG_VERSION }}
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://johnvansickle.com/ffmpeg/releases/ffmpeg-${{ env.FFMPEG_VERSION }}-amd64-static.tar.xz" \
            -o /tmp/ff.tar.xz
          mkdir -p /tmp/ffmpeg-${{ env.FFMPEG_VERSION }}
          tar -xJf /tmp/ff.tar.xz -C /tmp/ffmpeg-${{ env.FFMPEG_VERSION }} --strip-components=1
      - name: Install FFmpeg ${{ env.FFMPEG_VERSION }} into PATH
        run: |
          sudo cp /tmp/ffmpeg-${{ env.FFMPEG_VERSION }}/ffmpeg /usr/local/bin/ffmpeg
          sudo cp /tmp/ffmpeg-${{ env.FFMPEG_VERSION }}/ffprobe /usr/local/bin/ffprobe
          sudo chmod +x /usr/local/bin/ffmpeg /usr/local/bin/ffprobe
          ffmpeg -version | head -1
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build --filter "./packages/*"
      - run: tsx scripts/generate-fixtures.ts
        env: { FFMPEG_PATH: /usr/local/bin/ffmpeg }
      - run: pnpm test:golden
        env:
          FFMPEG_PATH: /usr/local/bin/ffmpeg
          FFMPEG_PINNED_VERSION: '${{ env.FFMPEG_VERSION }}'

  # ── Stage 5: Perf gates ───────────────────────────────────────────────────
  perf:
    name: Stage 5 — Perf Gates
    runs-on: ubuntu-latest
    needs: golden
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - name: Cache FFmpeg ${{ env.FFMPEG_VERSION }}
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /tmp/ffmpeg-${{ env.FFMPEG_VERSION }}
          key: ffmpeg-${{ env.FFMPEG_VERSION }}-linux-amd64-static
      - name: Download FFmpeg ${{ env.FFMPEG_VERSION }}
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://johnvansickle.com/ffmpeg/releases/ffmpeg-${{ env.FFMPEG_VERSION }}-amd64-static.tar.xz" \
            -o /tmp/ff.tar.xz
          mkdir -p /tmp/ffmpeg-${{ env.FFMPEG_VERSION }}
          tar -xJf /tmp/ff.tar.xz -C /tmp/ffmpeg-${{ env.FFMPEG_VERSION }} --strip-components=1
      - name: Install FFmpeg ${{ env.FFMPEG_VERSION }} into PATH
        run: |
          sudo cp /tmp/ffmpeg-${{ env.FFMPEG_VERSION }}/ffmpeg /usr/local/bin/ffmpeg
          sudo chmod +x /usr/local/bin/ffmpeg
          ffmpeg -version | head -1
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build --filter "./packages/*"
      - run: tsx scripts/generate-fixtures.ts
      - run: pnpm test:perf
        env: { FFMPEG_PATH: /usr/local/bin/ffmpeg }

  # ── Stage 6: E2E (Playwright, Chromium-only, PR subset) ──────────────────
  e2e:
    name: Stage 6 — E2E (PR subset)
    runs-on: ubuntu-latest
    needs: perf
    env:
      BASE_URL: http://localhost:4173
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build --filter "./packages/*"
      - name: Build web app
        run: pnpm --filter @videoforge/web build
        env:
          VITE_API_BASE_URL: http://localhost:4000/api/v1
          VITE_WS_URL: ws://localhost:4000/ws
          VITE_SENTRY_DSN: ''
      - name: Serve web app (background)
        run: |
          pnpm --filter @videoforge/web preview --port 4173 --host &
          # Wait for the preview server to be ready
          npx --yes wait-on http://localhost:4173 --timeout 30000
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm exec playwright test --project=chromium
        continue-on-error: true
